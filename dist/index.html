<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedFox Hub - 每日热点聚合</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }
        h1 { font-size: 2.5em; color: #ff6b35; margin-bottom: 10px; }
        .subtitle { color: #888; font-size: 1.1em; }
        .update-time { color: #666; font-size: 0.9em; margin-top: 10px; }
        
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .nav a {
            color: #ff6b35;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid #ff6b35;
            border-radius: 25px;
            transition: all 0.3s;
        }
        .nav a:hover, .nav a.active {
            background: #ff6b35;
            color: #fff;
        }
        
        .section {
            display: none;
            animation: fadeIn 0.5s;
        }
        .section.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2a2a3e;
            transition: transform 0.2s, border-color 0.2s;
        }
        .card:hover {
            transform: translateX(5px);
            border-color: #ff6b35;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .card-title {
            font-size: 1.2em;
            color: #fff;
            text-decoration: none;
        }
        .card-title:hover { color: #ff6b35; }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .badge-hot { background: #ff4444; color: #fff; }
        .badge-new { background: #44ff44; color: #000; }
        .badge-trend { background: #ff6b35; color: #fff; }
        
        .meta {
            display: flex;
            gap: 15px;
            color: #888;
            font-size: 0.9em;
            margin-top: 10px;
        }
        .meta span { display: flex; align-items: center; gap: 5px; }
        
        .rank {
            font-size: 2em;
            font-weight: bold;
            color: #ff6b35;
            min-width: 50px;
        }
        
        .hotspot-item {
            display: flex;
            gap: 20px;
            align-items: start;
        }
        
        .platform-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            margin-right: 5px;
        }
        .plat-weibo { background: #e6162d; }
        .plat-douyin { background: #000; color: #fff; }
        .plat-bilibili { background: #00a1d6; }
        .plat-kuaishou { background: #ff5000; }
        .plat-zhihu { background: #0084ff; }
        .plat-toutiao { background: #f04142; }
        .plat-baidu { background: #2932e1; }
        
        .prediction {
            margin-top: 10px;
            padding: 10px;
            background: #0f0f1a;
            border-radius: 8px;
            font-size: 0.9em;
            color: #aaa;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        footer {
            text-align: center;
            padding: 40px 0;
            color: #666;
            border-top: 1px solid #333;
            margin-top: 40px;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .hotspot-item { flex-direction: column; }
            .rank { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔥 RedFox Hub</h1>
            <p class="subtitle">全网热点聚合 · AI资讯日报 · 抖音热榜</p>
            <p class="update-time">更新时间: {update_time}</p>
        </header>
        
        <nav class="nav">
            <a href="#hotspot" class="active" onclick="showSection('hotspot')">🔥 全网热点</a>
            <a href="#gzh" onclick="showSection('gzh')">📰 公众号AI</a>
            <a href="#channels" onclick="showSection('channels')">🎬 视频号AI</a>
            <a href="#douyin" onclick="showSection('douyin')">🎵 抖音热榜</a>
        </nav>
        
        <section id="hotspot" class="section active">
            <h2 style="margin-bottom: 20px;">🔥 全网聚合热点 TOP10</h2>
            {hotspot_content}
        </section>
        
        <section id="gzh" class="section">
            <h2 style="margin-bottom: 20px;">📰 公众号AI资讯</h2>
            {gzh_content}
        </section>
        
        <section id="channels" class="section">
            <h2 style="margin-bottom: 20px;">🎬 视频号AI热门</h2>
            {channels_content}
        </section>
        
        <section id="douyin" class="section">
            <h2 style="margin-bottom: 20px;">🎵 抖音每日热榜</h2>
            {douyin_content}
        </section>
        
        <footer>
            <p>RedFox Hub · 每日自动更新 · 数据来源: redfox.hk</p>
        </footer>
    </div>
    
    <script>
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelector(`a[href="#${id}"]`).classList.add('active');
        }
        
        // 默认显示hash对应的section
        if (location.hash) {
            showSection(location.hash.slice(1));
        }
    </script>
</body>
</html>
